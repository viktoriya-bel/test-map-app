<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<style>
		body {
			margin: 0;
		}

		#map {
			width: 100%;
			height: 100vh;
		}
	</style>
</head>

<body>
	<div id="map"></div>

	<script src="https://api-maps.yandex.ru/2.1/?apikey=ВАШ_API_КЛЮЧ&lang=ru_RU" type="text/javascript"></script>
	<script>
		let mapApp;
		ymaps.ready(init);

		function init() {
			mapApp = new ymaps.Map('map', {
				center: [46.347614, 48.030178],
				zoom: 14,
			});

			const points = [
				{ id: 1, lat: 46.372461, lon: 48.082918, title: 'АЗС Лукойл' },
				{ id: 2, lat: 46.361547, lon: 48.055771, title: 'АЗС Лукойл' },
				{ id: 3, lat: 46.359911, lon: 48.063542, title: 'АЗС Газпром' },
				{ id: 4, lat: 46.337891, lon: 48.041364, title: 'АЗС Газпром' },
				{ id: 5, lat: 46.339500, lon: 48.021691, title: 'АЗС Газпром' },
			];

			// Конвертируем массив в FeatureCollection для ObjectManager
			const features = {
				type: 'FeatureCollection',
				features: points.map((p, index) => ({
					id: p.id ?? index,
					type: 'Feature',
					geometry: {
						type: 'Point',
						coordinates: [p.lat, p.lon], // [широта, долгота]
					},
					properties: {
						balloonContentHeader: p.title,
						balloonContentBody: `Координаты: ${p.lat}, ${p.lon}`,
					},
				})),
			};

			const objectManager = new ymaps.ObjectManager({
				clusterize: true,
				gridSize: 64,
			});

			mapApp.geoObjects.add(objectManager);
			objectManager.add(features);
		}

		ymaps.ready(() => {
			if ('geolocation' in navigator) {
				navigator.geolocation.getCurrentPosition(
					(position) => {
						const lat = position.coords.latitude;
						const lon = position.coords.longitude;
						console.log('Ваши координаты:', lat, lon);
						alert('Ваши координаты:' + lat + lon);

						mapApp.setCenter([lat, lon]);

						new ymaps.Placemark(coords, {
							balloonContent: 'Вы здесь',
						});
					},
					(error) => {
						console.log('Ошибка геолокации:', error);
						alert('Ошибка геолокации:');
					},
					{
						enableHighAccuracy: true,
						timeout: 5000,
						maximumAge: 0,
					}
				);
			} else {
				console.log('Геолокация не поддерживается браузером');
				alert('Геолокация не поддерживается браузером');
			}


		});
	</script>
</body>

</html>
